name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=team_BmM07g8YY0iso8vRNtBE1V6O \
            --yes
        env:
          VERCEL_ORG_ID: team_BmM07g8YY0iso8vRNtBE1V6O
          VERCEL_PROJECT_ID: prj_VuZLaz74XHNtC93Nx4ABHb9XCA0A
